
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Math Fest Snow Cone</title>
<style>
    body {
      background: black;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 20px;
    }
    .game-container {
      max-width: 400px;
      margin: auto;
    }
    .snow-cone-wrapper {
      position: relative;
      width: 150px;
      height: 225px;
      margin: 30px auto 10px;
    }
    .scoop {
      width: 150px;
      height: 75px;
      background: linear-gradient(to right, #ff00cc, #6600ff);
      border-radius: 75px 75px 0 0;
      position: absolute;
      top: 0;
      left: 0;
      box-shadow: 0 0 15px #ff00cc, 0 0 30px #6600ff;
      z-index: 2;
      display: none;
    }
    .snow-cone {
      position: absolute;
      bottom: 0;
      width: 150px;
      height: 150px;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      background: linear-gradient(to bottom, #ffff99, #ffee00);
      box-shadow: 0 0 10px #fff, 0 0 20px yellow;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: box-shadow 0.3s ease;
    }
    .cone-text a {
      color: black;
      text-decoration: none;
      font-size: 20px;
      line-height: 1.2;
      z-index: 3;
    }
    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .score {
      font-size: 20px;
      color: #00ff88;
    }
    #timer {
      font-size: 16px;
      color: #00ccff;
    }
    .reset-button {
      background-color: #00ccff;
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 14px;
      border-radius: 6px;
      box-shadow: 0 0 10px #00ccff;
      cursor: pointer;
    }
    .math-problem {
      font-size: 28px;
      margin: 15px 0 10px;
    }
    .answer-display {
      font-size: 36px;
      color: #ff00cc;
      margin-bottom: 20px;
    }
    .mode-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .mode-buttons button {
      background-color: #00ff88;
      color: black;
      border: none;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      box-shadow: 0 0 10px #00ff88;
      cursor: pointer;
      width: 80px;
      height: 50px;
      line-height: 1.1;
    }
    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 320px;
      margin: auto;
    }
    .keypad button {
      background-color: #ff00cc;
      border: none;
      color: white;
      font-size: 20px;
      padding: 15px 0;
      border-radius: 8px;
      box-shadow: 0 0 10px #ff00cc;
      cursor: pointer;
    }
    canvas.confetti {
      position: fixed;
      pointer-events: none;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
    }
    .flash {
      animation: flashEffect 0.5s ease-in-out;
    }
    @keyframes flashEffect {
      0% { background: black; }
      50% { background: #ffee00; }
      100% { background: black; }
    }
  </style>
</head>
<body>
<canvas class="confetti" id="confettiCanvas"></canvas>
<div class="game-container" id="gameContainer">
<div class="score-bar">
<div class="score">Score: <span id="score">0</span></div>
<div id="timer">Time: 0s</div>
<button class="reset-button" onclick="resetScore()">Reset Score</button>
</div>
<div class="snow-cone-wrapper">
<div class="scoop" id="scoop"></div>
<div class="snow-cone" id="cone">
<div class="cone-text">
<a href="#" onclick="generateProblem()">Math<br/>Fest</a>
</div>
</div>
</div>
<div class="math-problem" id="problem">0 + 0 = 🍧</div>
<div class="answer-display" id="answerDisplay">0</div>
<div class="mode-buttons">
<button onclick="setMode('addsub')">+/-</button>
<button onclick="setMode('multdiv')">X-/</button>
<button onclick="setMode('hard')">Hard<br/>Mode</button>
<button onclick="openStoryModeModal()" style="white-space: pre-line; background-color: #00ff88; color: black; border: none; padding: 10px; font-size: 16px; border-radius: 6px; box-shadow: 0 0 10px #00ff88; cursor: pointer; width: 80px; height: 50px; line-height: 1.1;">Full
Scoop</button></div>
<div class="keypad">
<button onclick="appendNumber(7)">7</button>
<button onclick="appendNumber(8)">8</button>
<button onclick="appendNumber(9)">9</button>
<button onclick="submitAnswer()">Enter</button>
<button onclick="appendNumber(4)">4</button>
<button onclick="appendNumber(5)">5</button>
<button onclick="appendNumber(6)">6</button>
<button onclick="clearAnswer()">Clear</button>
<button onclick="appendNumber(1)">1</button>
<button onclick="appendNumber(2)">2</button>
<button onclick="appendNumber(3)">3</button>
<button onclick="toggleNegative()">-</button>
<button onclick="appendDecimal()">.</button>
<button onclick="appendNumber(0)">0</button>
<button onclick="toggleMute()">Mute</button>
<div></div>
</div>
</div>
<audio id="backgroundMusic1" preload="auto" src="quikserveST- All.mp3"></audio>
<audio id="correctSound" preload="auto" src="correct.mp3"></audio>
<audio id="incorrectSound" preload="auto" src="incorrect.mp3"></audio>
<script>

let score = 0;
let currentAnswer = "";
let correctAnswer = 0;
let currentProblemType = "+";
let mode = "addsub";
let isMuted = false;
let timerStarted = false;
let secondsElapsed = 0;
let timerInterval = null;

const correctTrack = document.getElementById("correctSound");
const incorrectTrack = document.getElementById("incorrectSound");
correctTrack.volume = 0.5;
incorrectTrack.volume = 0.5;

function openStoryModeModal() {
  document.getElementById("storyModeModal").style.display = "flex";
}

function closeStoryModeModal() {
  document.getElementById("storyModeModal").style.display = "none";
}

function setMode(newMode) {
  mode = newMode;
  showScoop(() => generateProblem());
  checkMilestones();
}

function appendNumber(num) {
  currentAnswer += num;
  document.getElementById("answerDisplay").textContent = currentAnswer;
}

function appendDecimal() {
  if (!currentAnswer.includes(".")) {
    currentAnswer += (currentAnswer === "" ? "0." : ".");
    document.getElementById("answerDisplay").textContent = currentAnswer;
  }
}

function toggleNegative() {
  currentAnswer = currentAnswer.startsWith("-") ? currentAnswer.slice(1) : "-" + currentAnswer;
  document.getElementById("answerDisplay").textContent = currentAnswer;
}

function clearAnswer() {
  currentAnswer = "";
  document.getElementById("answerDisplay").textContent = "0";
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById("backgroundMusic1").muted = isMuted;
  correctTrack.muted = isMuted;
  incorrectTrack.muted = isMuted;
}

function submitAnswer() {
  let userAnswer = parseFloat(currentAnswer);
  if (userAnswer === correctAnswer) {
    if (!timerStarted) {
      timerStarted = true;
      const music = document.getElementById("backgroundMusic1");
      music.currentTime = 0;
      music.play().catch(e => console.warn("Music play failed:", e));
      timerInterval = setInterval(() => {
        secondsElapsed++;
        document.getElementById("timer").textContent = `Time: ${secondsElapsed}s`;
        if (secondsElapsed >= 105) {
          clearInterval(timerInterval);
          alert(`🍧 Time's up! You scored ${score} points!`);
        }
      }, 1000);
    }

    if (!isMuted) {
      try {
        correctTrack.pause();
        correctTrack.currentTime = 0;
        correctTrack.play().catch(e => console.warn("Play failed", e));
      } catch (e) {
        console.warn("Error playing sound", e);
      }
    }

    score += (currentProblemType === "hard" ? 15 : (currentProblemType === "×" || currentProblemType === "÷" ? 6 : 3));
    document.getElementById("score").textContent = score;

    showScoop(() => {
      generateProblem();
      checkMilestones();
    });
  } else {
    if (!isMuted) {
      incorrectTrack.currentTime = 0;
      incorrectTrack.play();
    }
    score -= 3;
    document.getElementById("score").textContent = score;
    alert("Incorrect! Try again.");
    clearAnswer();
  }
}

function generateProblem() {
  let a, b, c, op1, op2;
  if (mode === "addsub") {
    a = Math.floor(Math.random() * 10);
    b = Math.floor(Math.random() * 10);
    op1 = Math.random() > 0.5 ? "+" : "-";
    if (op1 === "-" && b > a) [a, b] = [b, a];
    correctAnswer = op1 === "+" ? a + b : a - b;
    currentProblemType = op1;
    document.getElementById("problem").textContent = `${a} ${op1} ${b} = 🍧`;
  } else if (mode === "multdiv") {
    if (Math.random() > 0.5) {
      a = Math.floor(Math.random() * 10);
      b = Math.floor(Math.random() * 10);
      correctAnswer = a * b;
      currentProblemType = "×";
      document.getElementById("problem").textContent = `${a} × ${b} = 🍧`;
    } else {
      b = Math.floor(Math.random() * 9) + 1;
      correctAnswer = Math.floor(Math.random() * 10);
      a = b * correctAnswer;
      currentProblemType = "÷";
      document.getElementById("problem").textContent = `${a} ÷ ${b} = 🍧`;
    }
  } else if (mode === "hard") {
    a = Math.floor(Math.random() * 10);
    b = Math.floor(Math.random() * 10);
    c = Math.floor(Math.random() * 9) + 1;
    op1 = Math.random() > 0.5 ? "+" : "-";
    op2 = Math.random() > 0.5 ? "×" : "÷";
    let inner = op1 === "+" ? a + b : a - b;
    correctAnswer = op2 === "×" ? inner * c : Math.floor(inner / c);
    currentProblemType = "hard";
    document.getElementById("problem").textContent = `(${a} ${op1} ${b}) ${op2} ${c} = 🍧`;
  }
  currentAnswer = "";
  document.getElementById("answerDisplay").textContent = "0";
}

function resetScore() {
  score = 0;
  document.getElementById("score").textContent = "0";
  showScoop(() => generateProblem());
  checkMilestones();
}

function showScoop(callback) {
  const scoop = document.getElementById("scoop");
  scoop.style.display = "block";
  setTimeout(() => {
    scoop.style.display = "none";
    if (typeof callback === "function") {
      callback();
    }
  }, 700);
}

function checkMilestones() {
  if (score >= 50 && !window.fiftyTriggered) {
    window.fiftyTriggered = true;
    launchConfetti();
  }
  if (score >= 100 && !window.hundredTriggered) {
    window.hundredTriggered = true;
    document.getElementById("cone").style.boxShadow = "0 0 30px #ffee00, 0 0 60px #ff00cc";
    document.getElementById("gameContainer").classList.add("flash");
    setTimeout(() => document.getElementById("gameContainer").classList.remove("flash"), 600);
    alert("🍧 You hit 100 points! That's some serious math mojo!");
  }
}

function launchConfetti() {
  const canvas = document.getElementById("confettiCanvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let confetti = [];
  for (let i = 0; i < 100; i++) {
    confetti.push({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      r: Math.random() * 6 + 4,
      d: Math.random() * 10 + 10,
      color: `hsl(${Math.random() * 360}, 100%, 50%)`,
      tilt: Math.floor(Math.random() * 10) - 10,
      tiltAngleIncremental: Math.random() * 0.07 + 0.05,
      tiltAngle: 0
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    confetti.forEach(c => {
      ctx.beginPath();
      ctx.lineWidth = c.r;
      ctx.strokeStyle = c.color;
      ctx.moveTo(c.x + c.tilt + c.r / 2, c.y);
      ctx.lineTo(c.x + c.tilt, c.y + c.tilt + c.r / 2);
      ctx.stroke();
    });
    update();
  }
  function update() {
    for (let i = 0; i < confetti.length; i++) {
      confetti[i].tiltAngle += confetti[i].tiltAngleIncremental;
      confetti[i].y += (Math.cos(0.01 + confetti[i].d) + 3 + confetti[i].r / 2) / 2;
      confetti[i].x += Math.sin(0.01);
      confetti[i].tilt = Math.sin(confetti[i].tiltAngle - (i / 3)) * 15;
    }
  }
  (function loop() {
    draw();
    requestAnimationFrame(loop);
  })();
}

window.onload = () => {
  showScoop(() => generateProblem());
};

</script>
<div id="storyModeModal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.95); color:white; font-family: Arial, Helvetica, sans-serif; z-index:9999; justify-content:center; align-items:center;">
<div style="background:black; border:2px solid #00ff88; padding:20px; max-width:320px; box-shadow:0 0 20px #00ff88; text-align:center;">
<h2 style="color:#ffee00;">🌌 Yo, Cone Traveler 🌌</h2>
<p style="font-size:16px; line-height:1.6; color:#ffffff;">
        You ever wonder what’s inside a snow cone?<br/><br/>
        Like... the <em>real</em> inside?<br/>
        Let’s just say it’s deeper than syrup and ice.<br/><br/>
        You ready to go on a journey to the center of the snow cone?
      </p>
<button onclick="closeStoryModeModal()" style="margin:10px 5px; padding:10px 20px; background:#00ff88; color:black; border:none; border-radius:5px; font-size:16px; cursor:pointer;">Back to QuikServe</button>
<button disabled="" style="margin:10px 5px; padding:10px 20px; background:#ff00cc; color:white; border:none; border-radius:5px; font-size:16px; cursor:not-allowed;">Bet!</button>
</div>
</div></body>
</html>
