<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Fest Snow Cone</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="game-container">
    <div class="snow-cone-wrapper">
      <div id="scoop" class="scoop"></div>
      <div class="snow-cone">
        <div class="text">Math<br>Fest</div>
      </div>
    </div>

    <div id="questionBox" class="question-box">
      <span id="question">5 + 3 = ?</span>
      <div class="keypad">
        <!-- Keypad buttons -->
        <button class="key" id="key0">0</button>
        <button class="key" id="key1">1</button>
        <button class="key" id="key2">2</button>
        <button class="key" id="key3">3</button>
        <button class="key" id="key4">4</button>
        <button class="key" id="key5">5</button>
        <button class="key" id="key6">6</button>
        <button class="key" id="key7">7</button>
        <button class="key" id="key8">8</button>
        <button class="key" id="key9">9</button>
        <button class="key" id="keyClear">Clear</button>
      </div>
      <button class="button" id="submitButton">Submit</button>
    </div>
  </div>

  <audio id="correctSound" src="correct.mp3" preload="auto"></audio>
  <audio id="incorrectSound" src="incorrect.mp3" preload="auto"></audio>
  <script src="script.js"></script>
</body>
</html>
