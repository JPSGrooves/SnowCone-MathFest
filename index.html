<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Fest Snow Cone</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .game-container {
      max-width: 600px;
      margin: auto;
      transform: scale(0.90);
      transform-origin: top center;
    }

    .title-image {
      width: 100%;
      max-width: 500px;
      height: auto;
      margin: 0 auto 10px;
      display: block;
      cursor: pointer;
    }

    .layout-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin: -5px 0 5px 0;
      padding: 0 50px;
    }

    .score-block, .timer-block {
      text-align: center;
    }

    .score-label, .timer-label {
      font-size: 20px;
      margin-bottom: 5px;
    }

    .score-label { color: #00ff88; }
    .timer-label { color: #00ccff; }

    .score, #timer {
      font-size: 26px;
    }

    .cone-zone {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 50px;
      margin-top: 10px;
      margin-bottom: 0;
    }

    .cone-wrapper {
      position: relative;
      width: 130px;
      height: 210px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    .scoop {
      width: 130px;
      height: 65px;
      background: linear-gradient(to right, #ff00cc, #6600ff);
      border-radius: 65px 65px 0 0;
      box-shadow: 0 0 15px #ff00cc, 0 0 30px #6600ff;
      z-index: 2;
      position: relative;
      top: -5px; /* Restored vertical alignment from v.077.4 */
    }

    .main-scoop {
      display: none;
    }

    .cone-img {
      width: 130px;
      height: auto;
      z-index: 1;
      pointer-events: none;
    }

    .clone-cone .scoop {
      width: 60px;
      height: 32px;
      top: 0;
      border-top-left-radius: 50px;
      border-top-right-radius: 50px;
      position: relative;
    }

    .clone-cone .cone-img {
      width: 65px;
    }

    .left-spin {
      animation: spinLeft 6s linear infinite;
    }

    .right-spin {
      animation: spinRight 6s linear infinite;
    }

    @keyframes spinLeft {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinRight {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    .math-problem {
      font-size: 28px;
      margin: 5px 0 5px;
    }

    .answer-display {
      font-size: 36px;
      color: #ff00cc;
      margin-bottom: 10px;
    }

    .mode-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .mode-buttons button {
      background-color: #00ff88;
      color: black;
      border: none;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      box-shadow: 0 0 10px #00ff88;
      cursor: pointer;
      width: 80px;
      height: 50px;
      line-height: 1.1;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 320px;
      margin: auto;
    }

    .keypad button {
      background-color: #ff00cc;
      border: none;
      color: white;
      font-size: 20px;
      padding: 15px 0;
      border-radius: 8px;
      box-shadow: 0 0 10px #ff00cc;
      cursor: pointer;
    }

    canvas.confetti {
      position: fixed;
      pointer-events: none;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 999;
      display: none;
    }

    .popup, .final-score {
      position: fixed;
      background-color: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 20px;
      border: 2px solid #00ff88;
      border-radius: 12px;
      z-index: 2000;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px #00ff88;
      display: none;
    }

    .popup button, .final-score button {
      background-color: #00ff88;
      color: black;
      border: none;
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 0 10px #00ff88;
    }
  </style>
</head>
<body>

  <img src="SnowConeMathFestTitle.png" alt="SnowCone MathFest" class="title-image" onclick="resetScore()" />

  <div class="game-container">
    <div class="layout-row">
      <div class="score-block">
        <div class="score-label">Score</div>
        <div class="score"><span id="score">0</span></div>
      </div>
      <div class="timer-block">
        <div class="timer-label">Time</div>
        <div id="timer">0s</div>
      </div>
    </div>

    <div class="cone-zone">
      <div class="cone-wrapper clone-cone" id="leftCone">
        <div class="scoop"></div>
        <img src="cone.png" class="cone-img" />
      </div>
      <div class="cone-wrapper" id="mainCone">
        <div class="scoop main-scoop" id="scoop"></div>
        <img src="cone.png" class="cone-img" id="coneImg" />
      </div>
      <div class="cone-wrapper clone-cone" id="rightCone">
        <div class="scoop"></div>
        <img src="cone.png" class="cone-img" />
      </div>
    </div>
    <div class="math-problem" id="problem">0 + 0 = 🍧</div>
    <div class="answer-display" id="answerDisplay">0</div>

    <div class="mode-buttons">
      <button onclick="setMode('addsub')">+/-</button>
      <button onclick="setMode('multdiv')">× ÷</button>
      <button onclick="setMode('hard')">Hard<br>Mode</button>
    </div>

    <div class="keypad">
      <button onclick="appendNumber(7)">7</button>
      <button onclick="appendNumber(8)">8</button>
      <button onclick="appendNumber(9)">9</button>
      <button onclick="submitAnswer()">Enter</button>
      <button onclick="appendNumber(4)">4</button>
      <button onclick="appendNumber(5)">5</button>
      <button onclick="appendNumber(6)">6</button>
      <button onclick="clearAnswer()">Clear</button>
      <button onclick="appendNumber(1)">1</button>
      <button onclick="appendNumber(2)">2</button>
      <button onclick="appendNumber(3)">3</button>
      <button onclick="toggleNegative()">-</button>
      <button onclick="appendDecimal()">.</button>
      <button onclick="appendNumber(0)">0</button>
      <button onclick="toggleMute()">Mute</button>
    </div>

    <canvas id="confettiCanvas" class="confetti"></canvas>
    <div class="popup" id="popup">
      <p id="popup-message">Great job!</p>
      <button onclick="closePopup()">OK</button>
    </div>
    <div class="final-score" id="finalScorePopup">
      <p>Game Over! Your score: <span id="finalScore">0</span></p>
      <button onclick="resetScore()">Play Again</button>
    </div>
  </div>

  <script>
    let score = 0;
    let currentAnswer = "";
    let correctAnswer = 0;
    let mode = "addsub";
    let timerStarted = false;
    let gameEnded = false;
    let seconds = 0;
    let timerInterval;

    function setMode(newMode) {
      mode = newMode;
      generateProblem();
    }

    function appendNumber(n) {
      if (currentAnswer === "0" || currentAnswer === "-0")
        currentAnswer = currentAnswer.startsWith("-") ? "-" : "";
      currentAnswer += n;
      document.getElementById("answerDisplay").textContent = currentAnswer;
    }

    function toggleNegative() {
      if (!currentAnswer || currentAnswer === "0") {
        currentAnswer = "-";
      } else if (currentAnswer.startsWith("-")) {
        currentAnswer = currentAnswer.substring(1);
      } else {
        currentAnswer = "-" + currentAnswer;
      }
      document.getElementById("answerDisplay").textContent = currentAnswer;
    }

    function clearAnswer() {
      currentAnswer = "";
      document.getElementById("answerDisplay").textContent = "0";
    }

    function appendDecimal() {
      if (!currentAnswer.includes(".")) {
        currentAnswer += currentAnswer === "" ? "0." : ".";
        document.getElementById("answerDisplay").textContent = currentAnswer;
      }
    }

    function toggleMute() {
      const audios = document.querySelectorAll("audio");
      audios.forEach(audio => audio.muted = !audio.muted);
    }

    function submitAnswer() {
      if (gameEnded) return;
      const userAnswer = parseFloat(currentAnswer);
      if (userAnswer === correctAnswer) {
        score += 10;
        document.getElementById("score").textContent = score;
        triggerCelebration();
        if (!timerStarted) startTimer();
      } else {
        // You can add incorrect feedback here
      }
      generateProblem();
      clearAnswer();
    }

    function generateProblem() {
      let a, b, c, op1, op2;
      const after100 = score >= 100;

      if (mode === "addsub") {
        a = Math.floor(Math.random() * 100);
        b = Math.floor(Math.random() * 100);
        if (after100) {
          c = Math.floor(Math.random() * 100);
          op1 = Math.random() > 0.5 ? "+" : "-";
          op2 = Math.random() > 0.5 ? "+" : "-";
          correctAnswer = eval(`${a}${op1}${b}${op2}${c}`);
          document.getElementById("problem").textContent = `${a} ${op1} ${b} ${op2} ${c} = 🍧`;
        } else {
          op1 = Math.random() > 0.5 ? "+" : "-";
          correctAnswer = op1 === "+" ? a + b : a - b;
          document.getElementById("problem").textContent = `${a} ${op1} ${b} = 🍧`;
        }
      } else if (mode === "multdiv") {
        a = Math.floor(Math.random() * 20 - 10);
        b = Math.floor(Math.random() * 19 + 1);
        if (Math.random() > 0.5) {
          correctAnswer = a * b;
          document.getElementById("problem").textContent = `${a} × ${b} = 🍧`;
        } else {
          correctAnswer = Math.floor(Math.random() * 10 + 1);
          b = Math.floor(Math.random() * 9 + 1);
          a = correctAnswer * b;
          if (Math.random() > 0.5) a *= -1;
          correctAnswer = a / b;
          document.getElementById("problem").textContent = `${a} ÷ ${b} = 🍧`;
        }
      } else if (mode === "hard") {
        a = Math.floor(Math.random() * 11);
        b = Math.floor(Math.random() * 11);
        c = Math.floor(Math.random() * 11);
        op1 = Math.random() > 0.5 ? "+" : "-";
        op2 = Math.random() > 0.5 ? "*" : "/";
        const left = eval(`${a}${op1}${b}`);
        if (after100) {
          const op3 = Math.random() > 0.5 ? "*" : "/";
          correctAnswer = Math.floor(eval(`(${left})${op2}(${c}${op3}${a})`));
          document.getElementById("problem").textContent = `(${a} ${op1} ${b}) ${op2} (${c} ${op3} ${a}) = 🍧`;
        } else {
          correctAnswer = Math.floor(eval(`${left}${op2}${c}`));
          document.getElementById("problem").textContent = `(${a} ${op1} ${b}) ${op2} ${c} = 🍧`;
        }
      }
    }

    function triggerCelebration() {
      if ([25, 50, 75, 100, 150, 200, 350].includes(score)) {
        // Add canvas confetti or audio here
        console.log("Celebrate:", score);
      }
    }

    function startTimer() {
      timerStarted = true;
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById("timer").textContent = `${seconds}s`;
        if (seconds >= 105) endGame();
      }, 1000);
    }

    function endGame() {
      clearInterval(timerInterval);
      gameEnded = true;
      document.getElementById("finalScore").textContent = score;
      document.getElementById("finalScorePopup").style.display = "block";
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }

    function resetScore() {
      score = 0;
      seconds = 0;
      currentAnswer = "";
      correctAnswer = 0;
      gameEnded = false;
      timerStarted = false;
      document.getElementById("score").textContent = "0";
      document.getElementById("timer").textContent = "0s";
      document.getElementById("finalScorePopup").style.display = "none";
      generateProblem();
    }

    document.addEventListener("DOMContentLoaded", () => {
      generateProblem();
    });
  </script>
</body>
</html>
