<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Fest Snow Cone</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .game-container {
      max-width: 600px;
      margin: auto;
      transform: scale(0.90);
      transform-origin: top center;
    }

    .title-image {
      width: 100%;
      max-width: 500px;
      height: auto;
      margin: 0 auto 10px;
      display: block;
      cursor: pointer;
    }

    .layout-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin: -5px 0 5px 0;
      padding: 0 50px;
    }

    .score-block, .timer-block {
      text-align: center;
      width: auto;
    }

    .score-label {
      font-size: 20px;
      margin-bottom: 5px;
      color: #00ff88;
    }

    .timer-label {
      font-size: 20px;
      margin-bottom: 5px;
      color: #00ccff;
    }

    .score {
      font-size: 26px;
      color: #00ff88;
    }

    #timer {
      font-size: 26px;
      color: #00ccff;
    }

    .cone-zone {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 50px;
      margin-top: 10px;
      margin-bottom: 0;
    }

    .cone-wrapper {
      position: relative;
      width: 130px;
      height: 210px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    .scoop {
      width: 130px;
      height: 65px;
      background: linear-gradient(to right, #ff00cc, #6600ff);
      border-radius: 65px 65px 0 0;
      box-shadow: 0 0 15px #ff00cc, 0 0 30px #6600ff;
      z-index: 2;
      position: relative;
      top: -5px;
    }

    .main-scoop {
      display: none;
    }

    .cone-img {
      width: 130px;
      height: auto;
      z-index: 1;
      pointer-events: none;
    }

    .clone-cone .scoop {
      width: 60px;
      height: 32px;
      top: 0;
      border-top-left-radius: 50px;
      border-top-right-radius: 50px;
      position: relative;
    }

    .clone-cone .cone-img {
      width: 65px;
    }

    .left-spin {
      animation: spinLeft 6s linear infinite;
    }

    .right-spin {
      animation: spinRight 6s linear infinite;
    }

    @keyframes spinLeft {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinRight {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    .math-problem {
      font-size: 28px;
      margin: 5px 0 5px;
    }

    .answer-display {
      font-size: 36px;
      color: #ff00cc;
      margin-bottom: 10px;
    }

    .mode-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .mode-buttons button {
      background-color: #00ff88;
      color: black;
      border: none;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      box-shadow: 0 0 10px #00ff88;
      cursor: pointer;
      width: 80px;
      height: 50px;
      line-height: 1.1;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 320px;
      margin: auto;
    }

    .keypad button {
      background-color: #ff00cc;
      border: none;
      color: white;
      font-size: 20px;
      padding: 15px 0;
      border-radius: 8px;
      box-shadow: 0 0 10px #ff00cc;
      cursor: pointer;
    }

    canvas.confetti {
      position: fixed;
      pointer-events: none;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      display: block;
    }
  </style>
</head>
<body>
<canvas id="confettiCanvas" class="confetti"></canvas>
<canvas id="celebrationCanvas" class="confetti"></canvas>

<!-- TITLE -->
<img src="SnowConeMathFestTitle.png" alt="SnowCone MathFest" class="title-image" onclick="resetScore()" />

<!-- RULES MODAL -->
<div id="rulesModal" style="display:flex; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); color:white; font-family: Arial, Helvetica, sans-serif; z-index:9999; justify-content:center; align-items:center;">
  <div style="background:black; border:2px solid #ff00cc; padding:20px; max-width:300px; box-shadow:0 0 15px #ff00cc; text-align:center;">
    <h2 style="color:#ffee00;">🍧 SnowCone MathFest 🍧</h2>
    <p style="font-size:16px; line-height:1.5;">
      Welcome to the fest, where math is funky and cones are fresh.<br/><br/>
      ➕➖ Add & Subtract: <strong>+3 points</strong><br/>
      ✖️➗ Multiply & Divide: <strong>+6 points</strong><br/>
      💀 Hard Mode: <strong>+15 points</strong><br/>
      😵 Wrong answer: <strong>-3 points</strong><br/><br/>
      🍧 The song is 1:45 long — when it ends, your score freezes.
    </p>
    <button id="closeModalBtn" style="margin-top:10px; padding:10px 20px; background:#00ff88; color:black; border:none; border-radius:5px; font-size:16px; cursor:pointer;">Cool!</button>
  </div>
</div>

<!-- GAME CONTAINER -->
<div class="game-container" id="gameContainer">
  <div class="layout-row">
    <div class="score-block">
      <div class="score-label">Score</div>
      <div class="score"><span id="score">0</span></div>
    </div>
    <div class="timer-block">
      <div class="timer-label">Time</div>
      <div id="timer">0s</div>
    </div>
  </div>

  <div class="cone-zone">
    <div class="cone-wrapper clone-cone" id="leftCone">
      <div class="scoop"></div>
      <img src="cone.png" class="cone-img" />
    </div>

    <div class="cone-wrapper" id="mainCone">
      <div class="scoop main-scoop" id="scoop"></div>
      <img src="cone.png" id="coneImg" class="cone-img" />
    </div>

    <div class="cone-wrapper clone-cone" id="rightCone">
      <div class="scoop"></div>
      <img src="cone.png" class="cone-img" />
    </div>
  </div>

  <div class="math-problem" id="problem">0 + 0 = 🍧</div>
  <div class="answer-display" id="answerDisplay">0</div>

  <div class="mode-buttons">
    <button onclick="setMode('addsub')">+/-</button>
    <button onclick="setMode('multdiv')">X-/</button>
    <button onclick="setMode('hard')">Hard<br/>Mode</button>
    <button onclick="openStoryModeModal()" style="white-space: pre-line;">Full Scoop</button>
  </div>

  <div class="keypad">
    <button onclick="appendNumber(7)">7</button>
    <button onclick="appendNumber(8)">8</button>
    <button onclick="appendNumber(9)">9</button>
    <button onclick="submitAnswer()">Enter</button>
    <button onclick="appendNumber(4)">4</button>
    <button onclick="appendNumber(5)">5</button>
    <button onclick="appendNumber(6)">6</button>
    <button onclick="clearAnswer()">Clear</button>
    <button onclick="appendNumber(1)">1</button>
    <button onclick="appendNumber(2)">2</button>
    <button onclick="appendNumber(3)">3</button>
    <button onclick="toggleNegative()">-</button>
    <button onclick="appendDecimal()">.</button>
    <button onclick="appendNumber(0)">0</button>
    <button onclick="toggleMute()">Mute</button>
    <div></div>
  </div>
</div>

<!-- AUDIO ELEMENTS -->
<audio id="milestone25" preload="auto" src="QuikServe points25.mp3"></audio>
<audio id="milestone50" preload="auto" src="QuikServe points50.mp3"></audio>
<audio id="milestone75" preload="auto" src="QuikServe points75.mp3"></audio>
<audio id="milestone100" preload="auto" src="QuikServe points100.mp3"></audio>
<audio id="backgroundMusic1" preload="auto" src="quikserveST- All.mp3"></audio>
<audio id="correctSound" preload="auto" src="correct.mp3"></audio>
<audio id="incorrectSound" preload="auto" src="incorrect.mp3"></audio>

<script>
let score = 0;
let currentAnswer = "";
let correctAnswer = 0;
let currentProblemType = "+";
let mode = "addsub";
let isMuted = false;
let timerStarted = false;
let secondsElapsed = 0;
let timerInterval = null;
let gameEnded = false;

function generateProblem() {
  let a, b, c, d, op1, op2;
  const randomSign = () => (Math.random() < 0.5 ? -1 : 1);
  const isRamp = score >= 100;

  if (mode === "addsub") {
    if (isRamp) {
      a = Math.floor(Math.random() * 10) * randomSign();
      b = Math.floor(Math.random() * 10) * randomSign();
      c = Math.floor(Math.random() * 10) * randomSign();
      correctAnswer = a + b + c;
      currentProblemType = "+";
      document.getElementById("problem").textContent = `${a} + ${b} + ${c} = 🍧`;
    } else {
      a = Math.floor(Math.random() * 10) * randomSign();
      b = Math.floor(Math.random() * 10) * randomSign();
      op1 = Math.random() > 0.5 ? "+" : "-";
      correctAnswer = op1 === "+" ? a + b : a - b;
      currentProblemType = op1;
      document.getElementById("problem").textContent = `${a} ${op1} ${b} = 🍧`;
    }
  } else if (mode === "multdiv") {
    if (isRamp) {
      // Multiplication: double digits
      if (Math.random() > 0.5) {
        a = Math.floor(Math.random() * 90 + 10) * randomSign(); // 10-99
        b = Math.floor(Math.random() * 90 + 10) * randomSign(); // 10-99
        correctAnswer = a * b;
        currentProblemType = "×";
        document.getElementById("problem").textContent = `${a} × ${b} = 🍧`;
      } else {
        // Division: double-digit whole number results only
        correctAnswer = Math.floor(Math.random() * 90 + 10); // 10-99
        b = Math.floor(Math.random() * 9 + 1) * randomSign();
        a = correctAnswer * b;
        currentProblemType = "÷";
        document.getElementById("problem").textContent = `${a} ÷ ${b} = 🍧`;
      }
    } else {
      if (Math.random() > 0.5) {
        a = Math.floor(Math.random() * 10) * randomSign();
        b = Math.floor(Math.random() * 10) * randomSign();
        correctAnswer = a * b;
        currentProblemType = "×";
        document.getElementById("problem").textContent = `${a} × ${b} = 🍧`;
      } else {
        b = Math.floor(Math.random() * 9 + 1) * randomSign();
        correctAnswer = Math.floor(Math.random() * 10) * randomSign();
        a = b * correctAnswer;
        currentProblemType = "÷";
        document.getElementById("problem").textContent = `${a} ÷ ${b} = 🍧`;
      }
    }
  } else if (mode === "hard") {
    while (true) {
      a = Math.floor(Math.random() * 10) * randomSign();
      b = Math.floor(Math.random() * 10) * randomSign();
      c = Math.floor(Math.random() * 10) * randomSign();
      d = Math.floor(Math.random() * 10) * randomSign();
      op1 = Math.random() > 0.5 ? "+" : "-";
      op2 = Math.random() > 0.5 ? "×" : "÷";

      if (isRamp) {
        // Hard mode ramp: (a op b) op2 (c op d)
        let left = op1 === "+" ? a + b : a - b;
        let right = Math.random() > 0.5 ? c + d : c - d;
        if (op2 === "×") {
          correctAnswer = left * right;
        } else {
          if (right === 0 || left % right !== 0) continue;
          correctAnswer = left / right;
        }
        currentProblemType = "hard";
        document.getElementById("problem").textContent = `(${a} ${op1} ${b}) ${op2} (${c} ${op1} ${d}) = 🍧`;
        break;
      } else {
        // Pre-ramp classic: (a + b) × c or ÷ c
        let inner = op1 === "+" ? a + b : a - b;
        if (op2 === "×") {
          correctAnswer = inner * c;
          currentProblemType = "hard";
          document.getElementById("problem").textContent = `(${a} ${op1} ${b}) × ${c} = 🍧`;
          break;
        } else {
          if (c !== 0 && inner % c === 0) {
            correctAnswer = inner / c;
            currentProblemType = "hard";
            document.getElementById("problem").textContent = `(${a} ${op1} ${b}) ÷ ${c} = 🍧`;
            break;
          }
        }
      }
    }
  }

  currentAnswer = "";
  document.getElementById("answerDisplay").textContent = "0";
}
</script>
</body>
</html>
