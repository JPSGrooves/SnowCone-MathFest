<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#00ff88" />
  <title>SnowCone MathFest</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Icons -->
  <link rel="icon" href="assets/img/icons/icon-192.png" sizes="192x192" />
  <link rel="icon" href="assets/img/icons/icon-512.png" sizes="512x512" />
  <link rel="apple-touch-icon" href="assets/img/icons/icon-512.png" />

  <!-- Manifest for PWA -->
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <main id="app">
    <div class="menu-wrapper">
      <div class="menu-frame">
        <div class="menu-grid">
          <img id="menuImage" src="assets/img/branding/menubackground.png" class="menu-image" alt="Background" />
        
          <img src="assets/img/branding/SnowConeMathFestTitle.png"
               class="menu-title-top"
               alt="SnowCone MathFest Title" />
        
          <div class="menu-label kids">⛺<br>Kids<br>Camping</div>
          <div class="menu-label quick">🍧<br>QuickServe<br>Pavilion</div>
          <div class="menu-label tips">🧮<br>MathTips<br>Village</div>
          <div class="menu-label story">📖<br>StoryMode<br>Forest</div>
          <div class="menu-label infinity">♾️<br>Infinity Lake</div>
          <div class="menu-label install" onclick="handleInstallClick()">Install App</div>
        </div>
      </div>
    </div>
  </main>

  <!-- JS Scripts -->
  <script src="js/dataManager.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
  <script src="js/problems.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/story.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
