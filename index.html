<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Fest Snow Cone</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      font-family: Comic Sans MS, cursive, sans-serif;
      color: white;
    }

    .game-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .snow-cone-wrapper {
      position: relative;
      width: 150px;
      height: 225px;
      margin-bottom: 20px;
    }

    .scoop {
      width: 150px;
      height: 75px;
      background: linear-gradient(to right, #ff00cc, #6600ff);
      border-radius: 75px 75px 0 0;
      position: absolute;
      top: 0;
      left: 0;
      box-shadow: 0 0 15px #ff00cc, 0 0 30px #6600ff;
      z-index: 2;
      display: none;
    }

    .snow-cone {
      position: absolute;
      bottom: 0;
      width: 150px;
      height: 150px;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      background: linear-gradient(to bottom, #ffff99, #ffee00);
      box-shadow: 0 0 10px #fff, 0 0 20px yellow;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .text {
      position: absolute;
      bottom: 95px;
      color: black;
      font-size: 20px;
      text-align: center;
      line-height: 1.2;
      z-index: 3;
    }

    .question-box {
      margin-top: 20px;
      font-size: 24px;
      text-align: center;
    }

    .answer-display {
      font-size: 36px;
      color: #ff00cc;
      margin: 10px 0;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }

    .keypad button {
      font-size: 20px;
      padding: 12px;
      background-color: #ff00cc;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 0 10px #ff00cc;
    }

    .keypad button:hover {
      background-color: #e600b8;
    }

    .wide-button {
      font-size: 14px;
      padding: 12px;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="snow-cone-wrapper">
      <div id="scoop" class="scoop"></div>
      <div class="snow-cone">
        <div class="text">Math<br>Fest</div>
      </div>
    </div>

    <div class="question-box">
      <div id="question">5 + 3 = ?</div>
      <div id="answerDisplay" class="answer-display">0</div>
      <div class="keypad">
        <button onclick="appendNumber(1)">1</button>
        <button onclick="appendNumber(2)">2</button>
        <button onclick="appendNumber(3)">3</button>
        <button onclick="appendNumber(4)">4</button>
        <button onclick="appendNumber(5)">5</button>
        <button onclick="appendNumber(6)">6</button>
        <button onclick="appendNumber(7)">7</button>
        <button onclick="appendNumber(8)">8</button>
        <button onclick="appendNumber(9)">9</button>
        <button class="wide-button" onclick="clearAnswer()">Clear</button>
        <button onclick="appendNumber(0)">0</button>
        <button class="wide-button" onclick="checkAnswer()">Enter</button>
      </div>
    </div>
  </div>

  <audio id="correctSound" src="correct.mp3" preload="auto"></audio>
  <audio id="incorrectSound" src="incorrect.mp3" preload="auto"></audio>

  <script>
  let num1 = 5;
  let num2 = 3;
  let correctAnswer = num1 + num2;
  let currentAnswer = '';

  const scoop = document.getElementById('scoop');
  const question = document.getElementById('question');
  const answerDisplay = document.getElementById('answerDisplay');
  const correctSound = document.getElementById('correctSound');
  const incorrectSound = document.getElementById('incorrectSound');

  function appendNumber(num) {
    if (currentAnswer === '0') {
      currentAnswer = num.toString(); // Replace if current is just '0'
    } else {
      currentAnswer += num.toString();
    }
    updateDisplay();
  }

  function clearAnswer() {
    currentAnswer = '';
    updateDisplay();
  }

  function updateDisplay() {
    answerDisplay.textContent = currentAnswer === '' ? '0' : currentAnswer;
  }

  function checkAnswer() {
    const userAnswer = parseInt(currentAnswer === '' ? '0' : currentAnswer, 10);
    if (userAnswer === correctAnswer) {
      scoop.style.display = 'block';
      scoop.style.boxShadow = '0 0 20px #ff00cc, 0 0 40px #6600ff';
      correctSound.play().catch(err => console.log('Audio error:', err));
      setTimeout(() => {
        alert("Correct! Enjoy your snow cone!");
        loadNewQuestion();
      }, 500);
    } else {
      incorrectSound.play().catch(err => console.log('Audio error:', err));
      alert("Oops! Try again.");
      clearAnswer();
    }
  }

  function loadNewQuestion() {
    scoop.style.display = 'none';
    num1 = Math.floor(Math.random() * 10);
    num2 = Math.floor(Math.random() * 10);
    correctAnswer = num1 + num2;
    question.textContent = `${num1} + ${num2} = ?`;
    clearAnswer();
  }

  loadNewQuestion();
</script>
