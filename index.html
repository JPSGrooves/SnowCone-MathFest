<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snow Cone Math Game</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: 'Arial', sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .problem {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .answer {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 70px);
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }

    .key {
      background-color: #ff00cc;
      border: none;
      color: white;
      font-size: 24px;
      padding: 15px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px #ff00cc;
      cursor: pointer;
    }

    .key.wide {
      grid-column: span 3;
    }

    .mode-buttons {
      display: flex;
      flex-direction: column;
      position: absolute;
      left: 10px;
      top: 120px;
    }

    .mode-button {
      background-color: #00ff88;
      border: none;
      color: black;
      font-size: 18px;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 0 10px #00ff88;
      cursor: pointer;
      width: 70px;
    }

    .cone {
      width: 0;
      height: 0;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
      border-top: 60px solid #000;
      margin: 30px auto 0;
      position: relative;
      box-shadow: 0 0 10px #ff00cc;
    }

    .scoop {
      width: 80px;
      height: 40px;
      background-color: #ff00cc;
      border-radius: 50% 50% 0 0;
      position: absolute;
      top: -40px;
      left: -40px;
      display: none;
      box-shadow: 0 0 10px #ff00cc, 0 0 20px #ff00cc;
    }

    .score-reset-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 90%;
      max-width: 400px;
      margin-bottom: 10px;
    }

    .reset-button {
      padding: 5px 10px;
      font-size: 16px;
      background-color: #333;
      color: white;
      border: 1px solid #00ff88;
      border-radius: 5px;
      cursor: pointer;
    }

  </style>
</head>
<body>
  <div class="game-container">
    <div class="score-reset-container">
      <div id="scoreDisplay" style="font-size: 20px; color: #00ff88;">Score: 0</div>
      <button class="reset-button" onclick="resetScore()">Reset Score</button>
    </div>
    
    <div class="problem"><span id="num1"></span> <span id="operator"></span> <span id="num2"></span> = 🍧</div>
    <div class="answer" id="userAnswer">0</div>

    <div class="mode-buttons">
      <button class="mode-button" onclick="setMode('add-sub')">+/-</button>
      <button class="mode-button" onclick="setMode('mul-div')">X-/</button>
    </div>

    <div class="keypad">
      <button class="key" onclick="appendNumber(1)">1</button>
      <button class="key" onclick="appendNumber(2)">2</button>
      <button class="key" onclick="appendNumber(3)">3</button>
      <button class="key" onclick="appendNumber(4)">4</button>
      <button class="key" onclick="appendNumber(5)">5</button>
      <button class="key" onclick="appendNumber(6)">6</button>
      <button class="key" onclick="appendNumber(7)">7</button>
      <button class="key" onclick="appendNumber(8)">8</button>
      <button class="key" onclick="appendNumber(9)">9</button>
      <button class="key" onclick="clearAnswer()">Clear</button>
      <button class="key" onclick="appendNumber(0)">0</button>
      <button class="key" onclick="checkAnswer()">Enter</button>
    </div>

    <div class="cone">
      <div class="scoop" id="scoop"></div>
    </div>
  </div>

  <audio id="correctSound" src="correct.mp3"></audio>
  <audio id="incorrectSound" src="incorrect.mp3"></audio>

  <script>
    let currentAnswer = [0];
    let correctAnswer = 0;
    let score = 0;
    let mode = 'add-sub';

    const scoop = document.getElementById("scoop");

    function appendNumber(num) {
      if (currentAnswer.length === 1 && currentAnswer[0] === 0) {
        currentAnswer = [num];
      } else {
        currentAnswer.push(num);
      }
      updateAnswerDisplay();
    }

    function clearAnswer() {
      currentAnswer = [0];
      updateAnswerDisplay();
    }

    function updateAnswerDisplay() {
      document.getElementById("userAnswer").textContent = parseInt(currentAnswer.join(""), 10);
    }

    function updateScoreDisplay() {
      document.getElementById("scoreDisplay").textContent = `Score: ${score}`;
    }

    function resetScore() {
      score = 0;
      updateScoreDisplay();
    }

    function checkAnswer() {
      const userAnswer = parseInt(currentAnswer.join(""), 10);
      if (userAnswer === correctAnswer) {
        scoop.style.display = 'block';
        scoop.style.boxShadow = '0 0 20px #ff00cc, 0 0 40px #6600ff';
        document.getElementById("correctSound").play().catch(() => {});
        score++;
        updateScoreDisplay();
        setTimeout(() => {
          loadNewQuestion();
        }, 500);
      } else {
        document.getElementById("incorrectSound").play().catch(() => {});
        alert("Oops! Try again.");
        clearAnswer();
      }
    }

    function getRandomInt(max) {
      return Math.floor(Math.random() * (max + 1));
    }

    function setMode(newMode) {
      mode = newMode;
      loadNewQuestion();
    }

    function loadNewQuestion() {
      scoop.style.display = 'none';
      let num1, num2, operator;

      if (mode === 'add-sub') {
        if (Math.random() > 0.5) {
          num1 = getRandomInt(9);
          num2 = getRandomInt(9);
          operator = "+";
          correctAnswer = num1 + num2;
        } else {
          num1 = getRandomInt(9);
          num2 = getRandomInt(num1);
          operator = "-";
          correctAnswer = num1 - num2;
        }
      } else {
        if (Math.random() > 0.5) {
          num1 = getRandomInt(9);
          num2 = getRandomInt(9);
          operator = "×";
          correctAnswer = num1 * num2;
        } else {
          num2 = getRandomInt(8) + 1;
          correctAnswer = getRandomInt(9);
          num1 = num2 * correctAnswer;
          operator = "÷";
        }
      }

      document.getElementById("num1").textContent = num1;
      document.getElementById("num2").textContent = num2;
      document.getElementById("operator").textContent = operator;

      currentAnswer = [0];
      updateAnswerDisplay();
    }

    loadNewQuestion();
    updateScoreDisplay();
  </script>
</body>
</html>
