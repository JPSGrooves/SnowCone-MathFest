<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00ff88" />
  <title>SnowCone MathFest</title>

  <!-- 🍧 Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- 💎 Icons (optional if you use them) -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/img/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/img/icon-512.png">
  <link rel="apple-touch-icon" href="assets/img/icon-512.png">
</head>

<body>
  <header>
    <img src="assets/img/SnowConeMathFestTitle.png" alt="SnowCone MathFest" class="title-image" />
  </header>

  <main id="app">
    <section class="game-container" id="gameContainer">
      <!-- Score & Timer -->
      <div class="layout-row">
        <div class="score-block">
          <div class="score-label">Score</div>
          <div class="score"><span id="score">0</span></div>
        </div>
        <div class="timer-block">
          <div class="timer-label">Time</div>
          <div id="timer">0s</div>
        </div>
      </div>
    
      <!-- Math Problem -->
      <div class="math-problem" id="problem">0 + 0 = 🍧</div>
      <div class="answer-display" id="answerDisplay">0</div>
    
      <!-- Mode Buttons -->
      <div class="mode-buttons">
        <button onclick="setMode('addsub')">+/-</button>
        <button onclick="setMode('multdiv')">×/÷</button>
        <button onclick="setMode('hard')">Hard<br>Mode</button>
      </div>
    
      <!-- Keypad -->
      <section class="keypad">
        <button onclick="appendNumber(7)">7</button>
        <button onclick="appendNumber(8)">8</button>
        <button onclick="appendNumber(9)">9</button>
        <button class="enter-btn" onclick="submitAnswer()">Enter</button>
        <button onclick="appendNumber(4)">4</button>
        <button onclick="appendNumber(5)">5</button>
        <button onclick="appendNumber(6)">6</button>
        <button onclick="clearAnswer()">Clear</button>
        <button onclick="appendNumber(1)">1</button>
        <button onclick="appendNumber(2)">2</button>
        <button onclick="appendNumber(3)">3</button>
        <button onclick="toggleNegative()">−</button>
        <button onclick="appendDecimal()">.</button>
        <button onclick="appendNumber(0)">0</button>
        <button onclick="toggleMute()">Mute</button>
        <div></div>
      </section>
    </section>
  </main>

  <!-- 🔊 Audio assets will go here (optional) -->
  <!-- <audio id="correctSound" src="assets/audio/correct.mp3" preload="auto"></audio> -->

  <!-- 🧠 Game Scripts -->
  <script src="js/problems.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/story.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
