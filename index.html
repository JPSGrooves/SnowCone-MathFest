<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00ff88" />
  <title>SnowCone MathFest</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Icons -->
  <link rel="icon" href="assets/img/icons/icon-192.png" sizes="192x192" />
  <link rel="icon" href="assets/img/icons/icon-512.png" sizes="512x512" />
  <link rel="apple-touch-icon" href="assets/img/icons/icon-512.png" />

  <!-- Manifest for PWA -->
  <link rel="manifest" href="manifest.json" />
</head>
<body>

  <!-- Main App Container -->
  <main id="app">
    <div class="menu-container">
      <img src="assets/img/branding/menubackground.png" alt="SnowCone Menu" class="menu-map" />
  
      <!-- Overlay labels locked to image scale -->
      <div class="label-wrapper">
        <div class="menu-label quick" onclick="startQuickServe()">
          <span>QuickServe<br>Pavilion</span>
        </div>
        <div class="menu-label tips" onclick="startMathTips()">
          <span>MathTips<br>Village</span>
        </div>
        <div class="menu-label story" onclick="startStoryMode()">
          <span>StoryMode<br>Forest</span>
        </div>
        <div class="menu-label baby" onclick="startBabyScoop()">
          <span>BabyScoop<br>Fields</span>
        </div>
        <div class="menu-label infinity" onclick="startInfinityMode()">
          <span>Infinity Lake</span>
        </div>
      </div>
    </div>
  </main>

  <!-- JS Scripts -->
  <script src="js/dataManager.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
  <script src="js/problems.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/story.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
