<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snow Cone Math Game</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: 'Arial', sans-serif;
      text-align: center;
      padding: 20px;
    }

    .cone {
      width: 0;
      height: 0;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
      border-top: 60px solid #000;
      margin: 30px auto 0;
      position: relative;
      box-shadow: 0 0 10px #ff00cc;
    }

    .scoop {
      width: 80px;
      height: 40px;
      background-color: #ff00cc;
      border-radius: 50% 50% 0 0;
      position: absolute;
      top: -40px;
      left: -40px;
      display: none;
      box-shadow: 0 0 10px #ff00cc, 0 0 20px #ff00cc;
    }

    .problem {
      font-size: 2em;
      margin: 20px 0 10px;
    }

    .answer {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: #ff00cc;
    }

    .keypad, .mode-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 240px;
      margin: 10px auto;
    }

    .mode-buttons {
      margin-bottom: 20px;
    }

    button {
      width: 70px;
      height: 50px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      color: white;
      text-shadow: 0 0 5px white;
    }

    .keypad button {
      background-color: #ff00cc;
      box-shadow: 0 0 10px #ff00cc;
    }

    .mode-button {
      background-color: #00ff88;
      box-shadow: 0 0 10px #00ff88;
    }

    .score {
      margin-top: 20px;
      font-size: 1.2em;
    }

    .score button {
      margin-left: 10px;
      font-size: 0.9em;
      padding: 5px 10px;
      background-color: #00ccff;
      box-shadow: 0 0 10px #00ccff;
      border: none;
      border-radius: 10px;
      color: white;
    }
  </style>
</head>
<body>

  <div class="cone">
    <div class="scoop" id="scoop"></div>
  </div>

  <div class="problem" id="problem"></div>
  <div class="answer" id="answer">0</div>

  <div class="mode-buttons">
    <button class="mode-button" onclick="setMode('addsub')">+/-</button>
    <button class="mode-button" onclick="setMode('multdiv')">X-/</button>
  </div>

  <div class="keypad">
    <button onclick="appendNumber(1)">1</button>
    <button onclick="appendNumber(2)">2</button>
    <button onclick="appendNumber(3)">3</button>
    <button onclick="appendNumber(4)">4</button>
    <button onclick="appendNumber(5)">5</button>
    <button onclick="appendNumber(6)">6</button>
    <button onclick="appendNumber(7)">7</button>
    <button onclick="appendNumber(8)">8</button>
    <button onclick="appendNumber(9)">9</button>
    <button onclick="appendNumber(0)">0</button>
    <button onclick="clearAnswer()">Clear</button>
    <button onclick="submitAnswer()">Enter</button>
  </div>

  <div class="score">
    Score: <span id="score">0</span>
    <button onclick="resetScore()">Reset</button>
  </div>

  <script>
    let currentAnswer = '';
    let correctAnswer = 0;
    let mode = 'addsub';
    let score = 0;

    function randomInt(max) {
      return Math.floor(Math.random() * (max + 1));
    }

    function generateProblem() {
      let a = randomInt(9);
      let b = randomInt(9);
      let op = '+';

      if (mode === 'addsub') {
        op = Math.random() > 0.5 ? '+' : '-';
        if (op === '-' && b > a) [a, b] = [b, a];
        correctAnswer = op === '+' ? a + b : a - b;
      } else {
        op = Math.random() > 0.5 ? '×' : '÷';
        if (op === '×') {
          correctAnswer = a * b;
        } else {
          b = randomInt(8) + 1;
          correctAnswer = randomInt(9);
          a = b * correctAnswer;
        }
      }

      document.getElementById('problem').innerHTML = `${a} ${op} 🍧`;
      currentAnswer = '';
      document.getElementById('answer').textContent = '0';
      document.getElementById('scoop').style.display = 'none';
    }

    function appendNumber(num) {
      if (currentAnswer === '0') {
        currentAnswer = '' + num;
      } else {
        currentAnswer += num;
      }
      document.getElementById('answer').textContent = currentAnswer;
    }

    function clearAnswer() {
      currentAnswer = '';
      document.getElementById('answer').textContent = '0';
    }

    function submitAnswer() {
      if (parseInt(currentAnswer || '0') === correctAnswer) {
        document.getElementById('scoop').style.display = 'block';
        score++;
        document.getElementById('score').textContent = score;
        setTimeout(generateProblem, 1000);
      } else {
        clearAnswer();
      }
    }

    function setMode(newMode) {
      mode = newMode;
      generateProblem();
    }

    function resetScore() {
      score = 0;
      document.getElementById('score').textContent = score;
    }

    generateProblem();
  </script>

</body>
</html>
