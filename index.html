<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnowCone Menu</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="menu-wrapper">
    <img src="assets/img/branding/menubackground.png" alt="SnowCone Menu" class="menu-map" />
    
    <div class="label-container">
      <div class="menu-label baby" onclick="startBabyScoop()">BabyScoop<br>Fields</div>
      <div class="menu-label quick" onclick="startQuickServe()">QuickServe<br>Pavilion</div>
      <div class="menu-label story" onclick="startStoryMode()">StoryMode<br>Forest</div>
      <div class="menu-label tips" onclick="startMathTips()">MathTips<br>Village</div>
      <div class="menu-label infinity" onclick="startInfinityMode()">Infinity<br>Lake</div>
    </div>
  </div>

  <!-- JS Hooks (Replace alerts with real functions) -->
  <script>
    function startBabyScoop() { alert("BabyScoop Mode!"); }
    function startQuickServe() { alert("QuickServe Mode!"); }
    function startStoryMode() { alert("Story Mode!"); }
    function startMathTips() { alert("Math Tips Mode!"); }
    function startInfinityMode() { alert("Infinity Mode!"); }
  </script>
</body>
</html>
