<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Fest Snow Cone</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .game-container {
      max-width: 400px;
      margin: auto;
    }

    .snow-cone-wrapper {
      position: relative;
      width: 150px;
      height: 225px;
      margin: 30px auto 20px;
    }

    .scoop {
      width: 150px;
      height: 75px;
      background: linear-gradient(to right, #ff00cc, #6600ff);
      border-radius: 75px 75px 0 0;
      position: absolute;
      top: 0;
      left: 0;
      box-shadow: 0 0 15px #ff00cc, 0 0 30px #6600ff;
      z-index: 2;
      display: none;
    }

    .snow-cone {
      position: absolute;
      bottom: 0;
      width: 150px;
      height: 150px;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      background: linear-gradient(to bottom, #ffff99, #ffee00);
      box-shadow: 0 0 10px #fff, 0 0 20px yellow;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .cone-text {
      color: black;
      font-size: 20px;
      line-height: 1.2;
      z-index: 3;
    }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .score {
      font-size: 20px;
      color: #00ff88;
    }

    .reset-button {
      background-color: #00ccff;
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 14px;
      border-radius: 6px;
      box-shadow: 0 0 10px #00ccff;
      cursor: pointer;
    }

    .math-problem {
      font-size: 28px;
      margin: 15px 0 10px;
    }

    .answer-display {
      font-size: 36px;
      color: #ff00cc;
      margin-bottom: 20px;
    }

    .mode-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .mode-buttons button {
      background-color: #00ff88;
      color: black;
      border: none;
      padding: 10px 12px;
      font-size: 16px;
      border-radius: 6px;
      box-shadow: 0 0 10px #00ff88;
      cursor: pointer;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 240px;
      margin: auto;
    }

    .keypad button {
      background-color: #ff00cc;
      border: none;
      color: white;
      font-size: 20px;
      padding: 15px 0;
      border-radius: 8px;
      box-shadow: 0 0 10px #ff00cc;
      cursor: pointer;
    }

    .wide-button {
      font-size: 16px;
      padding: 10px 0;
    }
  </style>
</head>
<body>

  <div class="game-container">

    <div class="score-bar">
      <div class="score">Score: <span id="score">0</span></div>
      <button class="reset-button" onclick="resetScore()">Reset Score</button>
    </div>

    <div class="snow-cone-wrapper">
      <div id="scoop" class="scoop"></div>
      <div class="snow-cone">
        <div class="cone-text">Math<br>Fest</div>
      </div>
    </div>

    <div class="math-problem" id="problem">0 + 0 = ?</div>
    <div class="answer-display" id="answerDisplay">0</div>

    <div class="mode-buttons">
      <button onclick="setMode('addsub')">+/-</button>
      <button onclick="setMode('multdiv')">X-/</button>
    </div>

    <div class="keypad">
      <button onclick="appendNumber(1)">1</button>
      <button onclick="appendNumber(2)">2</button>
      <button onclick="appendNumber(3)">3</button>
      <button onclick="appendNumber(4)">4</button>
      <button onclick="appendNumber(5)">5</button>
      <button onclick="appendNumber(6)">6</button>
      <button onclick="appendNumber(7)">7</button>
      <button onclick="appendNumber(8)">8</button>
      <button onclick="appendNumber(9)">9</button>
      <button class="wide-button" onclick="clearAnswer()">Clear</button>
      <button onclick="appendNumber(0)">0</button>
      <button class="wide-button" onclick="submitAnswer()">Enter</button>
    </div>
  </div>

  <audio id="correctSound" src="correct.mp3"></audio>
  <audio id="incorrectSound" src="incorrect.mp3"></audio>

  <script>
    let currentAnswer = '';
    let correctAnswer = 0;
    let mode = 'addsub';
    let score = 0;

    function randomInt(max) {
      return Math.floor(Math.random() * (max + 1));
    }

    function generateProblem() {
      let a, b, op;

      if (mode === 'addsub') {
        a = randomInt(9);
        b = randomInt(9);
        op = Math.random() > 0.5 ? '+' : '-';
        if (op === '-' && b > a) [a, b] = [b, a];
        correctAnswer = op === '+' ? a + b : a - b;
      } else {
        if (Math.random() > 0.5) {
          a = randomInt(9);
          b = randomInt(9);
          op = '×';
          correctAnswer = a * b;
        } else {
          b = randomInt(8) + 1;
          correctAnswer = randomInt(9);
          a = b * correctAnswer;
          op = '÷';
        }
      }

      document.getElementById('problem').textContent = `${a} ${op} ${b} = ?`;
      currentAnswer = '';
      updateDisplay();
      document.getElementById('scoop').style.display = 'none';
    }

    function appendNumber(num) {
      if (currentAnswer === '0') {
        currentAnswer = '' + num;
      } else {
        currentAnswer += num;
      }
      updateDisplay();
    }

    function clearAnswer() {
      currentAnswer = '';
      updateDisplay();
    }

    function updateDisplay() {
      document.getElementById('answerDisplay').textContent = currentAnswer || '0';
    }

    function submitAnswer() {
      if (parseInt(currentAnswer) === correctAnswer) {
        score++;
        document.getElementById('score').textContent = score;
        document.getElementById('scoop').style.display = 'block';
        document.getElementById('correctSound').play().catch(() => {});
        setTimeout(generateProblem, 800);
      } else {
        document.getElementById('incorrectSound').play().catch(() => {});
        alert("Oops! Try again.");
        clearAnswer();
      }
    }

    function setMode(newMode) {
      mode = newMode;
      generateProblem();
    }

    function resetScore() {
      score = 0;
      document.getElementById('score').textContent = score;
    }

    generateProblem();
  </script>
</body>
</html>
