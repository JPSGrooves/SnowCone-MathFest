<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snow Cone Math Game</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .score {
      margin: 10px 0;
      font-size: 20px;
      color: #00ffff;
    }

    .problem {
      font-size: 30px;
      margin: 20px;
    }

    .snowcone {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .answer {
      font-size: 30px;
      color: hotpink;
    }

    .keypad, .mode-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    .button, .mode-button, .reset-button {
      width: 60px;
      height: 60px;
      margin: 5px;
      font-size: 20px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .button {
      background-color: hotpink;
    }

    .mode-button {
      background-color: limegreen;
    }

    .reset-button {
      background-color: deepskyblue;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="score" id="score">Score: 0</div>
    <div class="snowcone">🍧</div>
    <div class="problem" id="problem"></div>
    <div class="answer" id="answer">0</div>

    <div class="top-row">
      <button class="mode-button" onclick="setMode('addsub')">+/-</button>
      <button class="mode-button" onclick="setMode('multdiv')">X-/</button>
    </div>

    <div class="keypad" id="keypad">
      <button class="button" onclick="press(1)">1</button>
      <button class="button" onclick="press(2)">2</button>
      <button class="button" onclick="press(3)">3</button>
      <button class="button" onclick="press(4)">4</button>
      <button class="button" onclick="press(5)">5</button>
      <button class="button" onclick="press(6)">6</button>
      <button class="button" onclick="press(7)">7</button>
      <button class="button" onclick="press(8)">8</button>
      <button class="button" onclick="press(9)">9</button>
      <button class="button" onclick="press(0)">0</button>
      <button class="button" onclick="clearAnswer()">Clear</button>
      <button class="button" onclick="submitAnswer()">Enter</button>
    </div>

    <button class="reset-button" onclick="resetScore()">Reset</button>
  </div>

  <script>
    let currentAnswer = '';
    let currentProblem = {};
    let score = 0;
    let mode = 'addsub';

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateProblem() {
      let a = getRandomInt(0, 10);
      let b = getRandomInt(0, 10);
      let operator;
      if (mode === 'addsub') {
        operator = Math.random() < 0.5 ? '+' : '-';
        if (operator === '-' && a < b) [a, b] = [b, a];
      } else {
        operator = Math.random() < 0.5 ? '×' : '÷';
        if (operator === '×') {
          a = getRandomInt(0, 10);
          b = getRandomInt(0, 10);
        } else {
          b = getRandomInt(1, 10);
          a = b * getRandomInt(0, 10);
        }
      }

      currentProblem = { a, b, operator };
      document.getElementById('problem').innerText = `${a} ${operator} ${b} = 🍧`;
      currentAnswer = '0';
      document.getElementById('answer').innerText = currentAnswer;
    }

    function press(num) {
      if (currentAnswer === '0') {
        currentAnswer = String(num);
      } else {
        currentAnswer += String(num);
      }
      document.getElementById('answer').innerText = currentAnswer;
    }

    function clearAnswer() {
      currentAnswer = '0';
      document.getElementById('answer').innerText = currentAnswer;
    }

    function submitAnswer() {
      let correct;
      const { a, b, operator } = currentProblem;
      switch (operator) {
        case '+': correct = a + b; break;
        case '-': correct = a - b; break;
        case '×': correct = a * b; break;
        case '÷': correct = b !== 0 ? a / b : 0; break;
      }
      if (parseInt(currentAnswer) === correct) {
        score++;
      } else {
        score--;
      }
      document.getElementById('score').innerText = `Score: ${score}`;
      generateProblem();
    }

    function setMode(newMode) {
      mode = newMode;
      generateProblem();
    }

    function resetScore() {
      score = 0;
      document.getElementById('score').innerText = `Score: ${score}`;
      generateProblem();
    }

    generateProblem();
  </script>
</body>
</html>
