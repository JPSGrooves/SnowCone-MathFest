<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00ff88" />
  <title>SnowCone MathFest</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Icons -->
  <link rel="icon" href="assets/img/icons/icon-192.png" sizes="192x192" />
  <link rel="icon" href="assets/img/icons/icon-512.png" sizes="512x512" />
  <link rel="apple-touch-icon" href="assets/img/icons/icon-512.png" />

  <!-- Manifest for PWA -->
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <main id="app">
    <div class="menu-wrapper">
      <div class="menu-frame">
        <img src="assets/img/branding/menubackground.png" alt="SnowCone Menu" class="menu-map" />

        <div class="label-container">
          <img class="menu-title-top" src="assets/img/branding/SnowConeMathFestTitle.png" alt="SnowCone MathFest Title" />
          <div class="menu-label tips"><span class="emoji">🧮</span><br>MathTips<br>Village</div>
          <div class="menu-label kids"><span class="emoji">⛺</span><br>Kids<br>Camping</div>
          <div class="menu-label story"><span class="emoji">📖</span><br>StoryMode<br>Forest</div>
          <div class="menu-label quick"><span class="emoji">🍧</span><br>QuickServe<br>Pavilion</div>
          <div class="menu-label infinity">♾️<span class="emoji">♾️</span><br>Infinity<br>Lake</div>
        </div>
      </div>
    </div>
  </main>

  <!-- JS Scripts -->
  <script src="js/dataManager.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
  <script src="js/problems.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/story.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
