<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Fest Snow Cone</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      font-family: Comic Sans MS, cursive, sans-serif;
      color: white;
    }

    .game-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .snow-cone-wrapper {
      position: relative;
      width: 150px;
      height: 225px;
      margin-bottom: 20px;
    }

    .scoop {
      width: 150px;
      height: 75px;
      background: linear-gradient(to right, #ff00cc, #6600ff);
      border-radius: 75px 75px 0 0;
      position: absolute;
      top: 0;
      left: 0;
      box-shadow: 0 0 15px #ff00cc, 0 0 30px #6600ff;
      z-index: 2;
    }

    .snow-cone {
      position: absolute;
      bottom: 0;
      width: 150px;
      height: 150px;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      background: linear-gradient(to bottom, #ffff99, #ffee00);
      box-shadow: 0 0 10px #fff, 0 0 20px yellow;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .text {
      position: absolute;
      bottom: 40px;
      color: black;
      font-size: 20px;
      text-align: center;
      line-height: 1.2;
      z-index: 3;
    }

    .question-box {
      margin-top: 20px;
      font-size: 24px;
      text-align: center;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 10px;
      margin-top: 20px;
    }

    .key {
      font-size: 24px;
      padding: 20px;
      background-color: #ff00cc;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      box-shadow: 0 0 10px #ff00cc;
    }

    .key:hover {
      background-color: #6600ff;
      box-shadow: 0 0 15px #6600ff;
    }

    #clear, #enter {
      grid-column: span 3;
      font-size: 24px;
    }

    .hidden {
      visibility: hidden;
    }

    .input-display {
      font-size: 32px;
      margin-bottom: 20px;
      color: #ff00cc;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="snow-cone-wrapper">
      <div id="scoop" class="scoop"></div>
      <div class="snow-cone">
        <div class="text">Math<br>Fest</div>
      </div>
    </div>

    <div id="questionBox" class="question-box">
      <div class="input-display" id="inputDisplay">0</div>
      <span id="question">5 + 3 = ?</span>
    </div>

    <div class="keypad">
      <!-- Number keys -->
      <button class="key" onclick="addToInput(1)">1</button>
      <button class="key" onclick="addToInput(2)">2</button>
      <button class="key" onclick="addToInput(3)">3</button>
      <button class="key" onclick="addToInput(4)">4</button>
      <button class="key" onclick="addToInput(5)">5</button>
      <button class="key" onclick="addToInput(6)">6</button>
      <button class="key" onclick="addToInput(7)">7</button>
      <button class="key" onclick="addToInput(8)">8</button>
      <button class="key" onclick="addToInput(9)">9</button>
      <button class="key" onclick="addToInput(0)">0</button>
      
      <!-- Action keys -->
      <button id="clear" class="key" onclick="clearInput()">Clear</button>
      <button id="enter" class="key" onclick="submitAnswer()">Enter</button>
    </div>
  </div>

  <!-- Guitar sound effects -->
  <audio id="correctSound" src="guitar-correct.mp3" preload="auto"></audio>
  <audio id="incorrectSound" src="guitar-error.mp3" preload="auto"></audio>

  <script>
    // Math question variables
    let num1 = 5;
    let num2 = 3;
    let correctAnswer = num1 + num2;

    // Get DOM elements
    const scoop = document.getElementById('scoop');
    const inputDisplay = document.getElementById('inputDisplay');
    const correctSound = document.getElementById('correctSound');
    const incorrectSound = document.getElementById('incorrectSound');
    const submitButton = document.getElementById('enter');

    let currentInput = '';

    // Add number to input display
    function addToInput(number) {
      currentInput += number;
      inputDisplay.textContent = currentInput;
    }

    // Clear input display
    function clearInput() {
      currentInput = '';
      inputDisplay.textContent = '0';
    }

    // Check if the answer is correct
    function submitAnswer() {
      const userAnswer = parseInt(currentInput);

      if (userAnswer === correctAnswer) {
        scoop.style.boxShadow = '0 0 20px #ff00cc, 0 0 40px #6600ff'; // Glow effect on correct answer
        correctSound.play().catch(error => console.log('Audio error: ', error)); // Play the correct guitar sound
        setTimeout(() => {
          alert("Correct! Enjoy your snow cone!");
        }, 500); // After a short delay, show the correct message
      } else {
        scoop.style.boxShadow = 'none'; // Reset glow on wrong answer
        incorrectSound.play().catch(error => console.log('Audio error: ', error)); // Play the incorrect guitar sound
        alert("Oops! Try again.");
      }

      // Clear input after submit
      currentInput = '';
      inputDisplay.textContent = '0';
    }
  </script>
</body>
</html>
