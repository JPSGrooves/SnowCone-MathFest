<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00ff88" />
  <title>SnowCone MathFest</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Icons -->
  <link rel="icon" href="assets/img/icons/icon-192.png" sizes="192x192" />
  <link rel="icon" href="assets/img/icons/icon-512.png" sizes="512x512" />
  <link rel="apple-touch-icon" href="assets/img/icons/icon-512.png" />

  <!-- Manifest for PWA -->
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <header>
    <img src="assets/img/branding/SnowConeMathFestTitle.png"
         alt="SnowCone MathFest"
         class="title-image" />
  </header>

  <main id="app">
    <section class="menu">
      <h2>🍧 Welcome to SnowCone MathFest 🍧</h2>
      <p>Select a mode to begin:</p>
      <button onclick="startMode('quickServe')">Quick Serve</button>
      <button onclick="startMode('tutorial')">Math Tips</button>
      <button onclick="startMode('story')">Story Mode</button>
      <button onclick="startMode('infinity')">Infinity Mode</button>
    </section>
  </main>

  <!-- Scripts -->
  <script src="js/dataManager.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
  <script src="js/problems.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/story.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
