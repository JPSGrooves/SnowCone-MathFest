<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00ff88" />
  <title>SnowCone MathFest</title>

  <!-- 💅 Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- 🧊 Icons -->
  <link rel="icon" href="assets/img/icon-192.png" sizes="192x192">
  <link rel="icon" href="assets/img/icon-512.png" sizes="512x512">
  <link rel="apple-touch-icon" href="assets/img/icon-512.png">

  <!-- 📱 PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
</head>

<body>
  <header>
    <img src="assets/img/SnowConeMathFestTitle.png" alt="SnowCone MathFest" class="title-image" />
  </header>

  <main id="app">
    <section id="menuScreen" class="menu-container">
      <h1 class="menu-title">🍧 SnowCone MathFest 🍧</h1>
    
      <div class="menu-buttons">
        <button class="menu-btn" onclick="startMathTips()">🧠 Math Tips / Intro</button>
        <button class="menu-btn" onclick="startQuickServe()">🍧 Quick Serve Mode</button>
        <button class="menu-btn disabled">📖 Story Mode — Coming Soon</button>
        <button class="menu-btn" onclick="startInfinityMode()">♾️ Infinity Mode</button>
        <button class="menu-btn" onclick="openMusicPlayer()">🎵 Music Player</button>
      </div>
    
      <div id="installTip" class="install-box">
        📲 <strong>Install SnowCone MathFest!</strong><br>
        Chrome: Tap here to install<br>
        Safari: Use Share → “Add to Home Screen”
      </div>
    </section>
  </main>

  <!-- 🔌 Core JS Files -->
  <script src="js/problems.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/story.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
