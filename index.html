<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Fest Snow Cone</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 20px;
    }
    .game-container {
      max-width: 400px;
      margin: auto;
      transform: scale(0.95);
      transform-origin: top center;
    }
    .snow-cone-wrapper {
      position: relative;
      width: 150px;
      height: 225px;
      margin: 30px auto 10px;
    }
    .scoop {
      width: 150px;
      height: 75px;
      background: linear-gradient(to right, #ff00cc, #6600ff);
      border-radius: 75px 75px 0 0;
      position: absolute;
      top: 0;
      left: 0;
      box-shadow: 0 0 15px #ff00cc, 0 0 30px #6600ff;
      z-index: 2;
      display: none;
    }
    .snow-cone {
      position: absolute;
      bottom: 0;
      width: 150px;
      height: 150px;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      background: linear-gradient(to bottom, #ffff99, #ffee00);
      box-shadow: 0 0 10px #fff, 0 0 20px yellow;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: box-shadow 0.3s ease;
    }
    .cone-text a {
      color: black;
      text-decoration: none;
      font-size: 20px;
      line-height: 1.2;
      z-index: 3;
    }
    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .score {
      font-size: 20px;
      color: #00ff88;
    }
    #timer {
      font-size: 16px;
      color: #00ccff;
    }
    .reset-button {
      background-color: #00ccff;
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 14px;
      border-radius: 6px;
      box-shadow: 0 0 10px #00ccff;
      cursor: pointer;
    }
    .math-problem {
      font-size: 28px;
      margin: 15px 0 10px;
    }
    .answer-display {
      font-size: 36px;
      color: #ff00cc;
      margin-bottom: 20px;
    }
    .mode-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .mode-buttons button {
      background-color: #00ff88;
      color: black;
      border: none;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      box-shadow: 0 0 10px #00ff88;
      cursor: pointer;
      width: 80px;
      height: 50px;
      line-height: 1.1;
    }
    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 320px;
      margin: auto;
    }
    .keypad button {
      background-color: #ff00cc;
      border: none;
      color: white;
      font-size: 20px;
      padding: 15px 0;
      border-radius: 8px;
      box-shadow: 0 0 10px #ff00cc;
      cursor: pointer;
    }
    canvas.confetti {
      position: fixed;
      pointer-events: none;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
    }
    .flash {
      animation: flashEffect 0.5s ease-in-out;
    }
    @keyframes flashEffect {
      0% { background: black; }
      50% { background: #ffee00; }
      100% { background: black; }
    }
  </style>
</head>
<body>
<!-- RULES MODAL -->
<div id="rulesModal" style="display:flex; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); color:white; font-family: Arial, Helvetica, sans-serif; z-index:9999; justify-content:center; align-items:center;">
  <div style="background:black; border:2px solid #ff00cc; padding:20px; max-width:300px; box-shadow:0 0 15px #ff00cc; text-align:center;">
    <h2 style="color:#ffee00;">🍧 SnowCone MathFest 🍧</h2>
    <p style="font-size:16px; line-height:1.5;">
      Welcome to the fest, where math is funky and cones are fresh.<br/><br/>
      ➕➖ Add & Subtract: <strong>+3 points</strong><br/>
      ✖️➗ Multiply & Divide: <strong>+6 points</strong><br/>
      💀 Hard Mode: <strong>+15 points</strong><br/>
      😵 Wrong answer: <strong>-3 points</strong><br/><br/>
      🍧 The song is 1:45 long — when it ends, your score freezes.
    </p>
    <button id="closeModalBtn" style="margin-top:10px; padding:10px 20px; background:#00ff88; color:black; border:none; border-radius:5px; font-size:16px; cursor:pointer;">Cool!</button>
  </div>
</div>

<canvas class="confetti" id="confettiCanvas"></canvas>
<canvas class="confetti" id="celebrationCanvas"></canvas>

<!-- MILESTONE SOUNDS -->
<audio id="milestone25" preload="auto" src="QuikServe points25.mp3"></audio>
<audio id="milestone50" preload="auto" src="QuikServe points50.mp3"></audio>
<audio id="milestone75" preload="auto" src="QuikServe points75.mp3"></audio>
<audio id="milestone100" preload="auto" src="QuikServe points100.mp3"></audio>
<audio id="backgroundMusic1" preload="auto" src="quikserveST- All.mp3"></audio>
<audio id="correctSound" preload="auto" src="correct.mp3"></audio>
<audio id="incorrectSound" preload="auto" src="incorrect.mp3"></audio>

<div class="game-container" id="gameContainer">
  <div class="score-bar">
    <div class="score">Score: <span id="score">0</span></div>
    <div id="timer">Time: 0s</div>
    <button class="reset-button" onclick="resetScore()">Reset Score</button>
  </div>

  <div class="snow-cone-wrapper">
    <div class="scoop" id="scoop"></div>
    <div class="snow-cone" id="cone">
      <div class="cone-text">
        <a href="#" onclick="generateProblem()">Math<br/>Fest</a>
      </div>
    </div>
  </div>

  <div class="math-problem" id="problem">0 + 0 = 🍧</div>
  <div class="answer-display" id="answerDisplay">0</div>
  <div class="mode-buttons">
    <button onclick="setMode('addsub')">+/-</button>
    <button onclick="setMode('multdiv')">X-/</button>
    <button onclick="setMode('hard')">Hard<br/>Mode</button>
    <button onclick="openStoryModeModal()" style="white-space: pre-line; background-color: #00ff88; color: black; border: none; padding: 10px; font-size: 16px; border-radius: 6px; box-shadow: 0 0 10px #00ff88; cursor: pointer; width: 80px; height: 50px; line-height: 1.1;">Full
Scoop</button>
  </div>
  <div class="keypad">
    <button onclick="appendNumber(7)">7</button>
    <button onclick="appendNumber(8)">8</button>
    <button onclick="appendNumber(9)">9</button>
    <button onclick="submitAnswer()">Enter</button>
    <button onclick="appendNumber(4)">4</button>
    <button onclick="appendNumber(5)">5</button>
    <button onclick="appendNumber(6)">6</button>
    <button onclick="clearAnswer()">Clear</button>
    <button onclick="appendNumber(1)">1</button>
    <button onclick="appendNumber(2)">2</button>
    <button onclick="appendNumber(3)">3</button>
    <button onclick="toggleNegative()">-</button>
    <button onclick="appendDecimal()">.</button>
    <button onclick="appendNumber(0)">0</button>
    <button onclick="toggleMute()">Mute</button>
    <div></div>
  </div>
</div>
<script>
let score = 0;
let currentAnswer = "";
let correctAnswer = 0;
let currentProblemType = "+";
let mode = "addsub";
let isMuted = false;
let timerStarted = false;
let secondsElapsed = 0;
let timerInterval = null;
let gameEnded = false;

const correctTrack = document.getElementById("correctSound");
const incorrectTrack = document.getElementById("incorrectSound");

const sound25 = document.getElementById("milestone25");
const sound50 = document.getElementById("milestone50");
const sound75 = document.getElementById("milestone75");
const sound100 = document.getElementById("milestone100");

correctTrack.volume = 0.5;
incorrectTrack.volume = 0.5;

function resetScore() {
  score = 0;
  currentAnswer = "";
  correctAnswer = 0;
  timerStarted = false;
  secondsElapsed = 0;
  gameEnded = false;
  window.twentyFiveTriggered = false;
  window.fiftyTriggered = false;
  window.seventyFiveTriggered = false;
  window.hundredTriggered = false;

  document.getElementById("score").textContent = "0";
  document.getElementById("timer").textContent = "Time: 0s";
  document.getElementById("answerDisplay").textContent = "0";
  document.getElementById("cone").style.boxShadow = "0 0 10px #fff, 0 0 20px yellow";
  document.getElementById("scoop").style.display = "none";
  document.getElementById("problem").textContent = "0 + 0 = 🍧";

  clearInterval(timerInterval);
  const music = document.getElementById("backgroundMusic1");
  music.pause();
  music.currentTime = 0;

  document.getElementById("rulesModal").style.display = "flex";
  generateProblem();
}

function checkMilestones() {
  const canvas = document.getElementById("celebrationCanvas");
  if (score >= 25 && !window.twentyFiveTriggered) {
    window.twentyFiveTriggered = true;
    if (!isMuted) sound25.play();
    sparkleShower(canvas);
  }
  if (score >= 50 && !window.fiftyTriggered) {
    window.fiftyTriggered = true;
    if (!isMuted) sound50.play();
    launchConfetti();
  }
  if (score >= 75 && !window.seventyFiveTriggered) {
    window.seventyFiveTriggered = true;
    if (!isMuted) sound75.play();
    launchConfetti();
    glowPulse();
  }
  if (score >= 100 && !window.hundredTriggered) {
    window.hundredTriggered = true;
    if (!isMuted) sound100.play();
    document.getElementById("cone").style.boxShadow = "0 0 30px #ffee00, 0 0 60px #ff00cc";
    document.getElementById("gameContainer").classList.add("flash");
    laserBeams(canvas);
    fireworkBurst(canvas);
    setTimeout(() => document.getElementById("gameContainer").classList.remove("flash"), 600);
  }
}

function sparkleShower(canvas) {
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let sparkles = [];
  for (let i = 0; i < 100; i++) {
    sparkles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      r: Math.random() * 2 + 1,
      d: Math.random() * 1 + 0.5,
      alpha: 1
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    sparkles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, 2 * Math.PI);
      ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
      ctx.fill();
    });
    update();
  }
  function update() {
    for (let p of sparkles) {
      p.y += p.d;
      p.alpha -= 0.005;
    }
    sparkles = sparkles.filter(p => p.alpha > 0);
  }
  (function loop() {
    if (sparkles.length === 0) return;
    draw();
    requestAnimationFrame(loop);
  })();
}

function glowPulse() {
  document.body.classList.add("flash");
  setTimeout(() => document.body.classList.remove("flash"), 800);
}

function fireworkBurst(canvas) {
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let bursts = [];
  for (let i = 0; i < 30; i++) {
    let angle = Math.random() * 2 * Math.PI;
    let speed = Math.random() * 5 + 2;
    bursts.push({
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 60,
      color: `hsl(${Math.random() * 360}, 100%, 60%)`
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    bursts.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, 2 * Math.PI);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    update();
  }
  function update() {
    bursts.forEach(p => {
      p.x += p.dx;
      p.y += p.dy;
      p.life -= 1;
    });
    bursts = bursts.filter(p => p.life > 0);
  }
  (function loop() {
    if (bursts.length === 0) return;
    draw();
    requestAnimationFrame(loop);
  })();
}

function laserBeams(canvas) {
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const origin = document.getElementById("answerDisplay").getBoundingClientRect();
  const originX = origin.left + origin.width / 2;
  const originY = origin.top + origin.height / 2;

  let beams = [];
  for (let i = 0; i < 6; i++) {
    beams.push({
      x: originX + i * 15 - 45,
      y: originY,
      height: 0,
      maxHeight: window.innerHeight,
      color: `hsl(${Math.random() * 360}, 100%, 50%)`
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    beams.forEach(b => {
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x, b.y - b.height);
      ctx.strokeStyle = b.color;
      ctx.lineWidth = 4;
      ctx.stroke();
    });
    update();
  }

  function update() {
    beams.forEach(b => {
      b.height += 20;
    });
    beams = beams.filter(b => b.height < b.maxHeight);
  }

  (function loop() {
    if (beams.length === 0) return;
    draw();
    requestAnimationFrame(loop);
  })();
}

window.onload = () => {
  document.getElementById("rulesModal").style.display = "flex";
};

document.getElementById("closeModalBtn").addEventListener("click", () => {
  document.getElementById("rulesModal").style.display = "none";
  generateProblem();
});
</script>
</body>
</html>
