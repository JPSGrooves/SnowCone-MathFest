<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnowCone MathFest</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <section id="menuScreen" class="menu-container">
    <h1 class="title-label">SnowCone MathFest</h1>
    <div class="mode-labels">
      <div class="mode-button">Quick Serve</div>
      <div class="mode-button">Math Tips</div>

      document.getElementById('menuScreen').style.display = 'flex';
    });
  </script>
</body>
</html>
