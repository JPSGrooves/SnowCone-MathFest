<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Fest Snow Cone</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .game-container {
      max-width: 400px;
      margin: auto;
    }

    .snow-cone-wrapper {
      position: relative;
      width: 150px;
      height: 225px;
      margin: 30px auto 20px;
    }

    .scoop {
      width: 150px;
      height: 75px;
      background: linear-gradient(to right, #ff00cc, #6600ff);
      border-radius: 75px 75px 0 0;
      position: absolute;
      top: 0;
      left: 0;
      box-shadow: 0 0 15px #ff00cc, 0 0 30px #6600ff;
      z-index: 2;
      display: none;
    }

    .snow-cone {
      position: absolute;
      bottom: 0;
      width: 150px;
      height: 150px;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      background: linear-gradient(to bottom, #ffff99, #ffee00);
      box-shadow: 0 0 10px #fff, 0 0 20px yellow;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .cone-text {
      color: black;
      font-size: 20px;
      line-height: 1.2;
      z-index: 3;
    }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .score {
      font-size: 20px;
      color: #00ff88;
    }

    #timer {
      font-size: 16px;
      color: #00ccff;
    }

    .reset-button {
      background-color: #00ccff;
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 14px;
      border-radius: 6px;
      box-shadow: 0 0 10px #00ccff;
      cursor: pointer;
    }

    .math-problem {
      font-size: 28px;
      margin: 15px 0 10px;
    }

    .answer-display {
      font-size: 36px;
      color: #ff00cc;
      margin-bottom: 20px;
    }

    .mode-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .mode-buttons button {
      background-color: #00ff88;
      color: black;
      border: none;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      box-shadow: 0 0 10px #00ff88;
      cursor: pointer;
      width: 80px;
      height: 50px;
      line-height: 1.1;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 320px;
      margin: auto;
    }

    .keypad button {
      background-color: #ff00cc;
      border: none;
      color: white;
      font-size: 20px;
      padding: 15px 0;
      border-radius: 8px;
      box-shadow: 0 0 10px #ff00cc;
      cursor: pointer;
    }

    canvas.confetti {
      position: fixed;
      pointer-events: none;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <canvas id="confettiCanvas" class="confetti"></canvas>

  <div class="game-container">
    <div class="score-bar">
      <div class="score">Score: <span id="score">0</span></div>
      <div id="timer">Time: 0s</div>
      <button class="reset-button" onclick="resetScore()">Reset Score</button>
    </div>

    <div class="snow-cone-wrapper">
      <div id="scoop" class="scoop"></div>
      <div class="snow-cone">
        <div class="cone-text">Math<br>Fest</div>
      </div>
    </div>

    <div class="math-problem" id="problem">0 + 0 = 🍧</div>
    <div class="answer-display" id="answerDisplay">0</div>

    <div class="mode-buttons">
      <button onclick="setMode('addsub')">+/-</button>
      <button onclick="setMode('multdiv')">X-/</button>
      <button onclick="setMode('hard')">Hard<br>Mode</button>
    </div>

    <div class="keypad">
      <button onclick="appendNumber(1)">1</button>
      <button onclick="appendNumber(2)">2</button>
      <button onclick="appendNumber(3)">3</button>
      <button onclick="toggleNegative()">-</button>
      <button onclick="appendNumber(4)">4</button>
      <button onclick="appendNumber(5)">5</button>
      <button onclick="appendNumber(6)">6</button>
      <button onclick="clearAnswer()">Clear</button>
      <button onclick="appendNumber(7)">7</button>
      <button onclick="appendNumber(8)">8</button>
      <button onclick="appendNumber(9)">9</button>
      <button onclick="submitAnswer()">Enter</button>
      <button onclick="appendNumber(0)">0</button>
    </div>
  </div>

  <audio id="correctSound" src="correct.mp3"></audio>
  <audio id="incorrectSound" src="incorrect.mp3"></audio>

  <script>
    let currentAnswer = '';
    let correctAnswer = 0;
    let mode = 'addsub';
    let score = 0;
    let currentProblemType = '+';

    let timerStarted = false;
    let secondsElapsed = 0;
    let timerInterval = null;
    let confettiTriggered = false;

    const confettiCanvas = document.getElementById('confettiCanvas');
    const ctx = confettiCanvas.getContext('2d');
    let confettiPieces = [];

    function randomInt(max) {
      return Math.floor(Math.random() * (max + 1));
    }

    function generateProblem() {
      let a, b, c, op1, op2;

      if (mode === 'addsub') {
        a = randomInt(9);
        b = randomInt(9);
        op1 = Math.random() > 0.5 ? '+' : '-';
        if (op1 === '-' && b > a) [a, b] = [b, a];
        correctAnswer = op1 === '+' ? a + b : a - b;
        document.getElementById('problem').textContent = `${a} ${op1} ${b} = 🍧`;
        currentProblemType = op1;
      }

      else if (mode === 'multdiv') {
        if (Math.random() > 0.5) {
          a = randomInt(9);
          b = randomInt(9);
          op1 = '×';
          correctAnswer = a * b;
        } else {
          b = randomInt(8) + 1;
          correctAnswer = randomInt(9);
          a = b * correctAnswer;
          op1 = '÷';
        }
        document.getElementById('problem').textContent = `${a} ${op1} ${b} = 🍧`;
        currentProblemType = op1;
      }

      else if (mode === 'hard') {
        a = randomInt(9);
        b = randomInt(9);
        c = randomInt(8) + 1;
        op1 = Math.random() > 0.5 ? '+' : '-';
        op2 = Math.random() > 0.5 ? '×' : '÷';
        let inner = op1 === '+' ? a + b : a - b;
        correctAnswer = op2 === '×' ? inner * c : Math.floor(inner / c);
        document.getElementById('problem').textContent = `(${a} ${op1} ${b}) ${op2} ${c} = 🍧`;
        currentProblemType = 'hard';
      }

      currentAnswer = '';
      updateDisplay();
      document.getElementById('scoop').style.display = 'none';
    }

    function appendNumber(num) {
      currentAnswer += num;
      updateDisplay();
    }

    function toggleNegative() {
      if (currentAnswer.startsWith('-')) {
        currentAnswer = currentAnswer.slice(1);
      } else {
        currentAnswer = '-' + currentAnswer;
      }
      updateDisplay();
    }

    function clearAnswer() {
      currentAnswer = '';
      updateDisplay();
    }

    function updateDisplay() {
      document.getElementById('answerDisplay').textContent = currentAnswer || '0';
    }

    function submitAnswer() {
      const answer = parseInt(currentAnswer);
      if (answer === correctAnswer) {
        startTimer();
        let points = 3;
        if (currentProblemType === '×' || currentProblemType === '÷') points = 6;
        if (currentProblemType === 'hard') points = 20;
        score += points;
        document.getElementById('score').textContent = score;
        document.getElementById('scoop').style.display = 'block';
        document.getElementById('correctSound').play().catch(() => {});
        setTimeout(generateProblem, 800);
      } else {
        score -= 3;
        document.getElementById('score').textContent = score;
        document.getElementById('incorrectSound').play().catch(() => {});
        alert("Oops! Try again.");
        clearAnswer();
      }
    }

    function startTimer() {
      if (!timerStarted) {
        timerStarted = true;
        timerInterval = setInterval(() => {
          secondsElapsed++;
          document.getElementById('timer').textContent = `Time: ${secondsElapsed}s`;
          if (secondsElapsed >= 60 && score > 50 && !confettiTriggered) {
            launchConfetti();
            confettiTriggered = true;
          }
        }, 1000);
      }
    }

    function resetScore() {
      score = 0;
      document.getElementById('score').textContent = score;
      clearInterval(timerInterval);
      timerStarted = false;
      secondsElapsed = 0;
      confettiTriggered = false;
      document.getElementById('timer').textContent = 'Time: 0s';
    }

    function setMode(newMode) {
      mode = newMode;
      generateProblem();
    }

    function launchConfetti() {
      const colors = ['#ff00cc', '#00ff88', '#00ccff', '#ffee00'];
      for (let i = 0; i < 100; i++) {
        confettiPieces.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * -50,
          size: Math.random() * 10 + 5,
          speedY: Math.random() * 3 + 2,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
      animateConfetti();
    }

    function animateConfetti() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      confettiPieces.forEach(piece => {
        ctx.fillStyle = piece.color;
        ctx.beginPath();
        ctx.arc(piece.x, piece.y, piece.size, 0, Math.PI * 2);
        ctx.fill();
        piece.y += piece.speedY;
      });
      confettiPieces = confettiPieces.filter(p => p.y < window.innerHeight);
      if (confettiPieces.length > 0) {
        requestAnimationFrame(animateConfetti);
      }
    }

    generateProblem();
  </script>
</body>
</html>
